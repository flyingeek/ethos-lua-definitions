name: Publish Release

on:
  push:
    branches:
      - "publish/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/publish/}"
          echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
          if [[ "$BRANCH" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Derive release name
        id: name
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Strip leading 'v' and split on '-' to get semver and date parts
          BODY="${TAG#v}"
          SEMVER="${BODY%%-*}"
          DATE_PART="${BODY#*-}"
          if [[ "$BODY" == "$SEMVER" ]]; then
            # No date suffix
            echo "release_name=Ethos ${SEMVER} definitions" >> "$GITHUB_OUTPUT"
          else
            # Convert YYYY.MM.DD to YYYY-MM-DD
            FORMATTED_DATE="${DATE_PART//./-}"
            echo "release_name=Ethos ${SEMVER} definitions (${FORMATTED_DATE})" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.name.outputs.release_name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: library/ethos.lua
          generate_release_notes: true
